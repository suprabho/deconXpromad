<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" height="100%"><defs><filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%"></filter></defs><style>    .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; }    .desc-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13.5px; font-weight: 400; fill: #64748b; }    .mono-meta { font-family: ui-monospace, monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }            .tunnel-container-bg { fill: #ffffff; stroke: #f1f5f9; stroke-width: 1; rx: 12px; }    .tunnel-header-bg { fill: #030712; rx: 8px 8px 0px 0px; }    .tunnel-header-text { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }    .tunnel-status-tag { font-family: ui-monospace, monospace; font-size: 9px; font-weight: 700; fill: #10b981; }            .chat-user-label { font-family: ui-monospace, monospace; font-size: 10.5px; font-weight: 700; fill: #2563eb; }    .chat-officer-label { font-family: ui-monospace, monospace; font-size: 10.5px; font-weight: 700; fill: #334155; }    .chat-timestamp { font-family: ui-monospace, monospace; font-size: 9px; font-weight: 500; fill: #94a3b8; text-anchor: end; }    .chat-msg-body { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 400; fill: #334155; }        .input-box-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 8px; }    .input-placeholder-txt { font-family: system-ui, sans-serif; font-size: 12.5px; font-weight: 400; fill: #94a3b8; }    .send-btn-circle { fill: #2563eb; rx: 6px; cursor: pointer; }        .outer-card-bg { fill: #ffffff; stroke: #f1f5f9; stroke-width: 1; rx: 16px; filter: url(#card-shadow); }    .cta-btn-bg { fill: #1d4ed8; rx: 10px; cursor: pointer; }    .cta-btn-text { font-family: system-ui, sans-serif; font-size: 12.5px; font-weight: 700; fill: #ffffff; }    .footer-msg { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #475569; }</style><rect x="15" y="15" width="770" height="620" class="outer-card-bg"></rect><g transform="translate(40, 42)"><circle cx="0" cy="0" r="5" fill="#ef4444"></circle><circle cx="14" cy="0" r="5" fill="#f59e0b"></circle><circle cx="28" cy="0" r="5" fill="#10b981"></circle><line x1="44" y1="-6" x2="44" y2="6" stroke="#e2e8f0" stroke-width="1"></line><text x="56" y="3" class="mono-meta" fill="#94a3b8">DECONFLICT SUITE // COORDINATION</text></g><g transform="translate(635, 28)"><rect x="0" y="0" width="125" height="26" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"></rect><text x="62.5" y="16" class="mono-meta" fill="#64748b" font-weight="bold" text-anchor="middle">SECURE LIVE SCREEN</text></g><line x1="15" y1="68" x2="785" y2="68" stroke="#f1f5f9" stroke-width="1"></line><g transform="translate(40, 110)"><text x="0" y="0" class="title-text">Operational Coordination</text><text x="0" y="24" class="desc-text">When immediate action is required, do not depend on vulnerable email chains. Our platform</text><text x="0" y="44" class="desc-text">establishes zero-knowledge encrypted channels allowing authorized compliance teams and vetted</text><text x="0" y="64" class="desc-text">law enforcement examiners to exchange crucial asset evidence directly and safely.</text></g><g transform="translate(40, 205)"><rect x="0" y="0" width="720" height="325" class="tunnel-container-bg"></rect><path d="M0,8 Q0,0 8,0 L712,0 Q720,0 720,8 L720,36 L0,36 Z" class="tunnel-header-bg"></path><g transform="translate(18, 11)" stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="12" height="9" rx="2" stroke-width="1.5"></rect><path d="M4.5 6V3.5a3.5 3.5 0 0 1 7 0V6"></path></g><text x="40" y="23" class="tunnel-header-text">TUNNEL_KEY: SECURE_LE_CO_4</text><text x="702" y="22" class="tunnel-status-tag" text-anchor="end">ESTABLISHED</text><g transform="translate(18, 56)"><text x="0" y="14" class="chat-user-label">Official ID-409</text><text x="684" y="13" class="chat-timestamp">10:14 AM</text><text x="0" y="34" class="chat-msg-body">Vetted threat block ID-174 match on address 0xef23b. Restricting fund dispersal recommended.</text></g><g transform="translate(18, 114)"><text x="0" y="14" class="chat-officer-label">Compliance Officer</text><text x="684" y="13" class="chat-timestamp">10:16 AM</text><text x="0" y="34" class="chat-msg-body">Understood. Account frozen. Reviewing secondary tier clusters.</text></g><g transform="translate(18, 260)"><rect x="0" y="0" width="640" height="42" class="input-box-bg"></rect><text x="14" y="25" class="input-placeholder-txt">Type evidence signature or response details...</text><g transform="translate(640, 0)"><rect x="7" y="0" width="42" height="42" class="send-btn-circle"></rect><g transform="translate(14, 12)" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></g></g></g></g><line x1="15" y1="560" x2="785" y2="560" stroke="#f1f5f9" stroke-width="1"></line><g transform="translate(40, 575)"><circle cx="0" cy="22" r="3.5" fill="#2563eb"></circle><text x="14" y="26" class="footer-msg">Trusted by 50+ compliance and digital risk departments.</text><g transform="translate(535, 2)"><rect x="0" y="0" width="185" height="40" class="cta-btn-bg"></rect><text x="20" y="24" class="cta-btn-text">Request Access Protocols</text><path d="M153,16 L153,23 L145,23 M153,23 L148,18" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></g></svg>